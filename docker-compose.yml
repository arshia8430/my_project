  #     - POSTGRES_USER=clinical_user
  #     - POSTGRES_PASSWORD=clinical_pass
  #     - POSTGRES_DB=clinical_mastery
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  backend-data:
  # postgres-data:
